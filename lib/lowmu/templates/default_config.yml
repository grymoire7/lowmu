# lowmu configuration file
# Generated by `lowmu configure`

# Hugo content directory (source of truth for input)
hugo_content_dir: ~/projects/my-blog/content

# Directory where generated content is stored (default: .lowmu)
# content_dir: .lowmu

# LLM configuration for AI-assisted content generation
llm:
  provider: anthropic
  model: claude-opus-4-6

# Generation targets (no auth needed — you post manually)
targets:
  - name: linkedin-long
    type: linkedin_long

  - name: linkedin-short
    type: linkedin_short

  - name: substack-long
    type: substack_long

  - name: substack-short
    type: substack_short

  - name: mastodon
    type: mastodon_short
    base_url: https://mastodon.social
