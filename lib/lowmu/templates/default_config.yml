# lowmu configuration file
# Generated by `lowmu configure`

# Hugo content directory (source of truth for input)
hugo_content_dir: ~/projects/my-blog/content

# Directory where generated content is stored (default: .lowmu)
# content_dir: .lowmu

# LLM configuration for AI-assisted content generation
llm:
  provider: anthropic
  # model: used for brainstorming (idea generation). Use a capable model here.
  model: claude-opus-4-6
  # index_model: used for RSS indexing (extracting remix dimensions from cached articles).
  # This runs once per article, so a cheaper/faster model keeps costs low.
  # Defaults to `model` if not set.
  # index_model: claude-haiku-4-5-20251001

# Generation targets (no auth needed — you post manually)
# Valid types: linkedin_long, linkedin_short, substack_long, substack_short, mastodon_short
targets:
  - linkedin_long
  - linkedin_short
  - substack_long
  - substack_short
  - mastodon_short

# Author persona for brainstorm command (used in LLM prompts)
# persona: |
#   I write about software engineering, developer tools, and productivity.
#   My audience is experienced developers who value depth over hype.

# Sources for brainstorm command
# sources:
#   - type: rss
#     url: https://example.com/feed.xml
#     name: example-blog
#   - type: file
#     path: ~/notes/ideas.md
#     name: my-ideas
