hugo_content_dir: /tmp/lowmu_test_hugo_content
content_dir: /tmp/lowmu_test_content

post_dirs: [posts]
note_dirs: [notes]

llm:
  provider: anthropic
  model: claude-opus-4-6

targets:
  - linkedin_long
  - linkedin_short
  - mastodon_short
  - substack_long
  - substack_short

persona: |
  I write about software engineering and developer tools.

sources:
  - type: rss
    url: https://example.com/feed.xml
    name: example-blog
  - type: file
    path: ~/notes/ideas.md
    name: my-ideas
